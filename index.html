<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>思连康 · 双歧杆菌四联活菌片｜产品学术资料</title>
<meta name="description" content="思连康（双歧杆菌四联活菌片）产品学术资料：简明处方、完整说明书、孕妇用药信息、四联协同、临床应用与微生态制剂对比。">
<style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:"Microsoft YaHei","PingFang SC",sans-serif;background:#f4f7f6;color:#1a2b30}.loading{min-height:100vh;display:grid;place-items:center;padding:24px}.card{width:min(440px,100%);padding:34px 28px;text-align:center;background:#fff;border:1px solid rgba(38,138,114,.16);border-radius:16px;box-shadow:0 18px 54px rgba(26,43,48,.09)}.mark{width:52px;height:52px;margin:0 auto 18px;border-radius:14px;display:grid;place-items:center;background:linear-gradient(145deg,#2fa085,#145a4a);color:#fff;font-size:22px;font-weight:700}.card h1{margin:0 0 10px;font-size:20px}.card p{margin:0;color:#6a7f86;font-size:14px;line-height:1.8}.bar{height:3px;margin-top:22px;overflow:hidden;border-radius:99px;background:#e6f4ef}.bar::after{content:"";display:block;width:45%;height:100%;border-radius:inherit;background:#268a72;animation:load 1.1s ease-in-out infinite alternate}@keyframes load{from{transform:translateX(-100%)}to{transform:translateX(225%)}}.error{color:#9b3d32}.error a{color:#1a6b58}</style>
</head>
<body>
<div class="loading"><div class="card" id="loader"><div class="mark">思</div><h1>思连康学术资料</h1><p>正在载入页面内容，请稍候……</p><div class="bar"></div></div></div>
<script>
(async()=>{
  const version='48089e079af3b000cd95d8c055ce82e6fa92d9bb66a4f32d1bb90598a05d775d';
  const files=[".index-payload.part000",".index-payload.part001",".index-payload.part002",".index-payload.part003",".index-payload.part01"];
  const bases=['./','https://raw.githubusercontent.com/Miea-123/menu/main/'];
  async function readPart(name){let lastError;for(const base of bases){try{const response=await fetch(base+name+'?v='+version,{cache:'no-store'});if(response.ok)return response.text();lastError=new Error(name+' 读取失败（HTTP '+response.status+'）')}catch(error){lastError=error}}throw lastError||new Error(name+' 读取失败')}
  const parts=await Promise.all(files.map(readPart));
  const encoded=parts.join('').replace(/\s+/g,'');
  const bytes=Uint8Array.from(atob(encoded),char=>char.charCodeAt(0));
  let html;
  if('DecompressionStream' in window){const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));html=await new Response(stream).text()}else{const module=await import('https://cdn.jsdelivr.net/npm/pako@2.1.0/+esm');html=new TextDecoder('utf-8').decode(module.ungzip(bytes))}
  if(!html.includes('孕妇用药情况')||!html.includes('2019 年昭衍国家 GLP 认证实验室')||!html.includes('与抗菌药间隔 2 h 服用')||!html.includes('思连康优势')||!html.includes('作用机制')||html.includes('本品特点')||html.includes('说明书未规定具体间隔时长')||html.includes('确需联合时遵医嘱')||html.includes('项目资料'))throw new Error('页面数据校验失败');
  document.open();document.write(html);document.close();
})().catch(error=>{const loader=document.getElementById('loader');loader.innerHTML='<div class="mark">!</div><h1 class="error">页面载入失败</h1><p>'+String(error.message||error)+'</p><p style="margin-top:14px">请刷新页面重试，或前往 <a href="https://github.com/Miea-123/menu">GitHub 仓库</a> 查看。</p>';console.error(error)});
</script>
<noscript><div class="loading"><div class="card"><h1>需要启用 JavaScript</h1><p>请在浏览器设置中启用 JavaScript 后重新打开本页面。</p></div></div></noscript>
</body>
</html>
